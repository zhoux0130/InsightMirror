services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-insightmirror}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insightmirror}
      POSTGRES_DB: ${POSTGRES_DB:-insightmirror}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-insightmirror}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-insightmirror}:${POSTGRES_PASSWORD:-insightmirror}@postgres:5432/${POSTGRES_DB:-insightmirror}
      COMPUTE_SERVICE_URL: http://compute:8000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  compute:
    build: ./packages/compute
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-insightmirror}:${POSTGRES_PASSWORD:-insightmirror}@postgres:5432/${POSTGRES_DB:-insightmirror}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/compute/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    restart: unless-stopped
    ports:
      - "${EPORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy
      compute:
        condition: service_healthy

volumes:
  pgdata:

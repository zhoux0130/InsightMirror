services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecpvision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecpvision}
      POSTGRES_DB: ${POSTGRES_DB:-ecpvision}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecpvision}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)throw r;process.exit(0)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    restart: unless-stopped
    ports:
      - "${EPORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  pgdata:
